# ESA Soil Moisture Workflow Configuration
# ==========================================

[paths]
# Directory structure
raw_data_dir = ./data/raw
processed_data_dir = ./data/processed
output_dir = ./data/output
figures_dir = ./figures

[cds_api]
# CDS API credentials (stored in ~/.cdsapirc)
# url: https://cds.climate.copernicus.eu/api
# key: YOUR_UID:YOUR_API_KEY

[dataset]
# Dataset identifier
dataset_name = satellite-soil-moisture
version = v202505

[download]
# Download parameters
product_type = combined  # Options: active, passive, combined
temporal_resolution = monthly  # Options: daily, 10_daily, monthly
data_format = zip

[variables]
# Available variables:
# Surface Soil Moisture (SSM)
# - volumetric_surface_soil_moisture (m3/m3)
# - saturation_surface_soil_moisture (%)
# Root-Zone Soil Moisture (RZSM) - requires combined product
# - root_zone_soil_moisture (multiple depths)
# Freeze/Thaw
# - freeze_thaw_classification

primary_variable = volumetric_surface_soil_moisture
secondary_variables = sm_uncertainty

[region]
# Africa bounding box
region_name = Africa
north = 40
south = -35
east = 55
west = -20

# Alternative regions (uncomment to use)
# East Africa
# north = 15
# south = -12
# east = 52
# west = 28

# West Africa
# north = 25
# south = 0
# east = 20
# west = -20

# Southern Africa
# north = -5
# south = -35
# east = 55
# west = 10

[temporal]
# Date range for download
start_date = 2020-01
end_date = 2023-12

[processing]
# Processing options
calculate_statistics = True
apply_quality_mask = True
resample_resolution = None  # e.g., 0.5 for 0.5 degree
export_csv = True
export_geotiff = False
export_netcdf = True

[analysis]
# Analysis parameters
anomaly_baseline_start = 2000-01
anomaly_baseline_end = 2020-12
drought_threshold = 0.2  # Soil moisture threshold for drought (m3/m3)

[visualization]
# Plot settings
colormap = YlGnBu
figure_dpi = 300
save_format = png
